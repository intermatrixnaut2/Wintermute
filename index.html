<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WINTERMUTE — 4K OBJ Renderer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #ui {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
      max-height: 100vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }

    #ui::-webkit-scrollbar { width: 4px; }
    #ui::-webkit-scrollbar-track { background: transparent; }
    #ui::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    #ui > * { pointer-events: all; }

    .panel {
      background: rgba(0,0,0,0.8);
      border: 1px solid #333;
      padding: 12px 16px;
      border-radius: 4px;
      min-width: 260px;
    }

    .panel h2 {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    label {
      font-size: 11px;
      color: #aaa;
      min-width: 80px;
    }

    input[type="range"] {
      flex: 1;
      accent-color: #7af;
    }

    input[type="file"] {
      font-size: 10px;
      color: #ccc;
      flex: 1;
    }

    select {
      background: #111;
      border: 1px solid #444;
      color: #ccc;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 3px;
      flex: 1;
    }

    button {
      background: #111;
      border: 1px solid #555;
      color: #ccc;
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
    }

    button:hover { border-color: #7af; color: #7af; }

    #status, #tex-status {
      font-size: 10px;
      color: #666;
      padding: 4px 0 0;
    }

    #export-btn { border-color: #a7f; color: #a7f; }
    #export-btn:hover { border-color: #fff; color: #fff; background: #2a1a3a; }

    .val {
      font-size: 11px;
      color: #7af;
      min-width: 36px;
      text-align: right;
    }

    /* Toggle switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle {
      position: relative;
      width: 34px;
      height: 18px;
      flex-shrink: 0;
    }

    .toggle input { display: none; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      left: 3px;
      top: 3px;
      background: #888;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle input:checked + .toggle-slider { background: #1a3a2a; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: #7fa; }

    .panel-accent { border-color: #2a4a3a; }
    .panel-accent h2 { color: #7fa; }

    #video-controls { display: none; }
    #vid-play { border-color: #7af; color: #7af; }
    #clear-tex { border-color: #f77; color: #f77; font-size: 10px; padding: 4px 10px; }
    #clear-tex:hover { background: #2a1010; border-color: #faa; color: #faa; }

    .sep {
      border: none;
      border-top: 1px solid #222;
      margin: 6px 0;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="ui">

    <!-- Model -->
    <div class="panel">
      <h2>WINTERMUTE</h2>
      <div class="row">
        <label>Load .obj</label>
        <input type="file" id="obj-input" accept=".obj" />
      </div>
      <div id="status">No model loaded</div>
    </div>

    <!-- Render Mode -->
    <div class="panel">
      <h2>Render Mode</h2>
      <div class="row">
        <label>Shader</label>
        <select id="shader-select">
          <option value="standard">Standard PBR</option>
          <option value="wireframe">Wireframe</option>
          <option value="normals">Normal Map</option>
          <option value="toon">Cel / Toon</option>
          <option value="xray">X-Ray</option>
          <option value="depth">Depth Field</option>
          <option value="hologram">Hologram</option>
          <option value="clay">Clay</option>
        </select>
      </div>
    </div>

    <!-- Texture Projection -->
    <div class="panel panel-accent">
      <h2>
        <span>Texture Projection</span>
        <label class="toggle toggle-wrap">
          <input type="checkbox" id="tex-toggle" />
          <span class="toggle-slider"></span>
        </label>
      </h2>

      <div class="row">
        <label>Source</label>
        <input type="file" id="tex-input" accept=".png,.jpg,.jpeg,.webp,.psd,.mov,.mp4,.webm" />
      </div>

      <div class="row">
        <label>Projection</label>
        <select id="projection-select">
          <option value="0">UV (Mesh UVs)</option>
          <option value="1">Planar X (Side)</option>
          <option value="2" selected>Planar Y (Top)</option>
          <option value="3">Planar Z (Front)</option>
          <option value="4">Cylindrical</option>
          <option value="5">Spherical</option>
          <option value="6">Triplanar / World</option>
        </select>
      </div>

      <div class="row">
        <label>Blend Mode</label>
        <select id="blend-select">
          <option value="0">Normal</option>
          <option value="1">Multiply</option>
          <option value="2">Add</option>
          <option value="3">Screen</option>
          <option value="4">Overlay</option>
        </select>
      </div>

      <hr class="sep" />

      <div class="row">
        <label>Opacity</label>
        <input type="range" id="tex-opacity" min="0" max="1" step="0.01" value="1" />
        <span class="val" id="tex-opacity-val">1.00</span>
      </div>

      <div class="row">
        <label>Tiling X</label>
        <input type="range" id="tiling-x" min="0.1" max="10" step="0.1" value="1" />
        <span class="val" id="tiling-x-val">1.0</span>
      </div>

      <div class="row">
        <label>Tiling Y</label>
        <input type="range" id="tiling-y" min="0.1" max="10" step="0.1" value="1" />
        <span class="val" id="tiling-y-val">1.0</span>
      </div>

      <div class="row">
        <label>Offset X</label>
        <input type="range" id="offset-x" min="-1" max="1" step="0.01" value="0" />
        <span class="val" id="offset-x-val">0.00</span>
      </div>

      <div class="row">
        <label>Offset Y</label>
        <input type="range" id="offset-y" min="-1" max="1" step="0.01" value="0" />
        <span class="val" id="offset-y-val">0.00</span>
      </div>

      <div class="row">
        <label>Rotation</label>
        <input type="range" id="tex-rotation" min="0" max="360" step="1" value="0" />
        <span class="val" id="tex-rotation-val">0°</span>
      </div>

      <hr class="sep" />

      <div class="row" id="video-controls">
        <button id="vid-play">▶ Play</button>
        <button id="vid-loop">Loop ON</button>
      </div>

      <div class="row">
        <button id="clear-tex">Clear Texture</button>
      </div>

      <div id="tex-status">No texture loaded</div>
    </div>

    <!-- Lighting -->
    <div class="panel">
      <h2>Lighting</h2>
      <div class="row">
        <label>Intensity</label>
        <input type="range" id="light-intensity" min="0" max="5" step="0.1" value="2" />
        <span class="val" id="light-intensity-val">2.0</span>
      </div>
      <div class="row">
        <label>Env Light</label>
        <input type="range" id="ambient" min="0" max="3" step="0.1" value="0.5" />
        <span class="val" id="ambient-val">0.5</span>
      </div>
      <div class="row">
        <label>Roughness</label>
        <input type="range" id="roughness" min="0" max="1" step="0.01" value="0.5" />
        <span class="val" id="roughness-val">0.50</span>
      </div>
      <div class="row">
        <label>Metalness</label>
        <input type="range" id="metalness" min="0" max="1" step="0.01" value="0.1" />
        <span class="val" id="metalness-val">0.10</span>
      </div>
    </div>

    <!-- Camera -->
    <div class="panel">
      <h2>Camera</h2>
      <div class="row">
        <label>Auto Rotate</label>
        <select id="auto-rotate">
          <option value="0">Off</option>
          <option value="0.5">Slow</option>
          <option value="1" selected>Medium</option>
          <option value="3">Fast</option>
        </select>
      </div>
      <div class="row">
        <button id="reset-camera">Reset Camera</button>
      </div>
    </div>

    <!-- Export -->
    <div class="panel">
      <h2>Export</h2>
      <div class="row">
        <label>Resolution</label>
        <select id="export-res">
          <option value="3840x2160">4K (3840×2160)</option>
          <option value="7680x4320">8K (7680×4320)</option>
          <option value="1920x1080">1080p (1920×1080)</option>
          <option value="2560x1440">1440p (2560×1440)</option>
        </select>
      </div>
      <div class="row">
        <button id="export-btn">Export PNG</button>
      </div>
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>

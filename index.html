<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WINTERMUTE — 4K OBJ Renderer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #ui {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    #ui > * { pointer-events: all; }

    .panel {
      background: rgba(0,0,0,0.75);
      border: 1px solid #333;
      padding: 12px 16px;
      border-radius: 4px;
      min-width: 240px;
    }

    .panel h2 {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    label {
      font-size: 11px;
      color: #aaa;
      min-width: 80px;
    }

    input[type="range"] {
      flex: 1;
      accent-color: #7af;
    }

    input[type="file"] {
      font-size: 11px;
      color: #ccc;
    }

    select {
      background: #111;
      border: 1px solid #444;
      color: #ccc;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 3px;
      flex: 1;
    }

    button {
      background: #111;
      border: 1px solid #555;
      color: #ccc;
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
    }

    button:hover {
      border-color: #7af;
      color: #7af;
    }

    #status {
      font-size: 11px;
      color: #666;
      padding: 6px 0 0;
    }

    #export-btn {
      border-color: #a7f;
      color: #a7f;
    }

    #export-btn:hover {
      border-color: #fff;
      color: #fff;
      background: #2a1a3a;
    }

    .val {
      font-size: 11px;
      color: #7af;
      min-width: 30px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="ui">
    <div class="panel">
      <h2>WINTERMUTE</h2>
      <div class="row">
        <label>Load .obj</label>
        <input type="file" id="obj-input" accept=".obj" />
      </div>
      <div id="status">No model loaded</div>
    </div>

    <div class="panel">
      <h2>Render Mode</h2>
      <div class="row">
        <label>Shader</label>
        <select id="shader-select">
          <option value="standard">Standard PBR</option>
          <option value="wireframe">Wireframe</option>
          <option value="normals">Normal Map</option>
          <option value="toon">Cel / Toon</option>
          <option value="xray">X-Ray</option>
          <option value="depth">Depth Field</option>
          <option value="hologram">Hologram</option>
          <option value="clay">Clay</option>
        </select>
      </div>
    </div>

    <div class="panel">
      <h2>Lighting</h2>
      <div class="row">
        <label>Intensity</label>
        <input type="range" id="light-intensity" min="0" max="5" step="0.1" value="2" />
        <span class="val" id="light-intensity-val">2.0</span>
      </div>
      <div class="row">
        <label>Env Light</label>
        <input type="range" id="ambient" min="0" max="3" step="0.1" value="0.5" />
        <span class="val" id="ambient-val">0.5</span>
      </div>
      <div class="row">
        <label>Roughness</label>
        <input type="range" id="roughness" min="0" max="1" step="0.01" value="0.5" />
        <span class="val" id="roughness-val">0.50</span>
      </div>
      <div class="row">
        <label>Metalness</label>
        <input type="range" id="metalness" min="0" max="1" step="0.01" value="0.1" />
        <span class="val" id="metalness-val">0.10</span>
      </div>
    </div>

    <div class="panel">
      <h2>Camera</h2>
      <div class="row">
        <label>Auto Rotate</label>
        <select id="auto-rotate">
          <option value="0">Off</option>
          <option value="0.5">Slow</option>
          <option value="1" selected>Medium</option>
          <option value="3">Fast</option>
        </select>
      </div>
      <div class="row">
        <button id="reset-camera">Reset Camera</button>
      </div>
    </div>

    <div class="panel">
      <h2>Export</h2>
      <div class="row">
        <label>Resolution</label>
        <select id="export-res">
          <option value="3840x2160">4K (3840×2160)</option>
          <option value="7680x4320">8K (7680×4320)</option>
          <option value="1920x1080">1080p (1920×1080)</option>
          <option value="2560x1440">1440p (2560×1440)</option>
        </select>
      </div>
      <div class="row">
        <button id="export-btn">Export PNG</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
